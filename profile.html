<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>الملف الشخصي — ماركت هب</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2D6A4F;--primary-d:#1B4332;--primary-m:#52B788;--primary-l:#D1FAE5;--accent:#D97706;--bg:#F3F4F6;--surface:#fff;--bark:#111827;--bark-m:#374151;--border:#E5E7EB;--gray:#9CA3AF;--radius:12px;}
body{font-family:'Noto Kufi Arabic','Inter',sans-serif;background:var(--bg);color:var(--bark);}
nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--primary);text-decoration:none;}
.nav-back{font-size:14px;font-weight:600;color:var(--primary);text-decoration:none;margin-right:auto;display:flex;align-items:center;gap:6px;}
.profile-hero{background:linear-gradient(135deg,var(--primary-d),var(--primary));padding:48px 24px;text-align:center;color:#fff;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:3px solid rgba(255,255,255,.3);}
.profile-name{font-size:26px;font-weight:800;}
.profile-location{font-size:14px;opacity:.75;margin-top:6px;display:flex;align-items:center;gap:6px;justify-content:center;}
.profile-bio{font-size:14px;opacity:.8;max-width:500px;margin:12px auto 0;line-height:1.7;}
.container{max-width:1100px;margin:32px auto;padding:0 16px 60px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.section-header h2{font-size:22px;font-weight:800;}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;}
.listing-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.2s;cursor:pointer;text-decoration:none;color:inherit;}
.listing-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-3px);}
.listing-img{height:200px;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.listing-img img{width:100%;height:100%;object-fit:cover;}
.listing-placeholder{color:var(--gray);}
.listing-placeholder svg{width:48px;height:48px;}
.listing-body{padding:16px;}
.listing-category{font-size:11px;font-weight:700;color:var(--primary);}
.listing-title{font-size:15px;font-weight:700;margin:6px 0 10px;}
.listing-meta{display:flex;align-items:center;gap:12px;font-size:13px;}
.listing-price{font-weight:700;color:var(--primary);font-size:16px;}
.listing-location{display:flex;align-items:center;gap:4px;color:var(--gray);font-size:12px;}
.empty{text-align:center;padding:60px 24px;color:var(--gray);font-size:15px;}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    ماركت هب
  </a>
  <a href="/" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    رجوع
  </a>
</nav>
<div class="profile-hero">
  <div class="profile-avatar" id="p-avatar">?</div>
  <div class="profile-name" id="p-name">جاري التحميل...</div>
  <div class="profile-location" id="p-location"></div>
  <div class="profile-bio" id="p-bio"></div>
</div>
<div class="container">
  <div class="section-header"><h2 id="listings-title">الإعلانات</h2></div>
  <div id="listings-container"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>
</div>
<script src="/public/js/api.js"></script>
<script src="/public/js/app.js"></script>
<script>
async function loadProfile() {
  try {
    const user = api.getUser();
    if (!user) { window.location.href = '/signin.html'; return; }
    document.getElementById('p-avatar').textContent = user.name?.charAt(0).toUpperCase() || '?';
    document.getElementById('p-name').textContent = user.name || 'غير معروف';
    document.getElementById('p-location').innerHTML = user.location ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${user.location}` : '';
    document.getElementById('p-bio').textContent = user.bio || '';
    document.title = user.name + ' — ماركت هب';
    document.getElementById('listings-title').textContent = 'إعلانات ' + user.name;
    const data = await api.getListings({ seller: user._id });
    const container = document.getElementById('listings-container');
    if (!data.listings?.length) { container.innerHTML = '<div class="empty">لا توجد إعلانات بعد.</div>'; return; }
    container.innerHTML = `<div class="listings-grid">${data.listings.map(renderListingCard).join('')}</div>`;
  } catch (e) { document.getElementById('listings-container').innerHTML = '<div class="empty">فشل تحميل الملف الشخصي.</div>'; }
}
loadProfile();
</script>
</body>
</html>
