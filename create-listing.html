<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>أضف إعلان — ماركت هب</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2D6A4F;--primary-d:#1B4332;--primary-m:#52B788;--primary-l:#D1FAE5;--accent:#D97706;--bg:#F3F4F6;--surface:#fff;--bark:#111827;--bark-m:#374151;--border:#E5E7EB;--gray:#9CA3AF;--radius:12px;}
body{font-family:'Noto Kufi Arabic','Inter',sans-serif;background:var(--bg);color:var(--bark);}
nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--primary);text-decoration:none;}
.nav-back{font-size:14px;font-weight:600;color:var(--primary);text-decoration:none;margin-right:auto;display:flex;align-items:center;gap:6px;}
.container{max-width:720px;margin:32px auto;padding:0 16px 60px;}
h1{font-size:26px;font-weight:800;margin-bottom:8px;}
.sub{color:var(--gray);font-size:14px;margin-bottom:32px;}
.form-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:24px;}
.form-card h3{font-size:16px;font-weight:700;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.field{margin-bottom:18px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--bark-m);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Noto Kufi Arabic','Inter',sans-serif;color:var(--bark);background:#fff;outline:none;transition:.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}
.field textarea{resize:vertical;min-height:120px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.upload-area:hover{border-color:var(--primary);background:var(--primary-l);}
.upload-area svg{width:40px;height:40px;color:var(--gray);margin-bottom:8px;}
.upload-area p{font-size:14px;color:var(--gray);}
.upload-area span{font-size:12px;color:var(--gray);}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:16px;}
.preview-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--bg);}
.preview-item img{width:100%;height:100%;object-fit:cover;}
.preview-remove{position:absolute;top:4px;left:4px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.tags-input{display:flex;flex-wrap:wrap;gap:8px;padding:8px;border:1.5px solid var(--border);border-radius:10px;min-height:44px;align-items:center;cursor:text;transition:.15s;}
.tags-input:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}
.tags-input input{border:none;outline:none;font-size:14px;font-family:'Noto Kufi Arabic','Inter',sans-serif;flex:1;min-width:80px;padding:4px;}
.tag{display:flex;align-items:center;gap:4px;background:var(--primary-l);color:var(--primary);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;}
.tag button{background:none;border:none;color:var(--primary);cursor:pointer;font-size:14px;line-height:1;}
.btn{padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Kufi Arabic',sans-serif;cursor:pointer;border:none;transition:.15s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-d);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.btn-outline{background:transparent;color:var(--bark-m);border:1.5px solid var(--border);}
.actions{display:flex;gap:12px;justify-content:flex-start;margin-top:8px;}
.error-msg{color:#EF4444;font-size:13px;margin-top:12px;display:none;}
@media(max-width:600px){.row2,.row3{grid-template-columns:1fr;} .form-card{padding:20px;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    ماركت هب
  </a>
  <a href="/" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    رجوع
  </a>
</nav>
<div class="container">
  <h1>أضف إعلان جديد</h1>
  <p class="sub">شارك ما لديك — منتجات، مهارات، خدمات أو أي شيء آخر.</p>
  <form id="listing-form" onsubmit="handleSubmit(event)">
    <div class="form-card">
      <h3>المعلومات الأساسية</h3>
      <div class="field">
        <label for="title">العنوان</label>
        <input type="text" id="title" placeholder="ماذا تعرض؟" required maxlength="120"/>
      </div>
      <div class="field">
        <label for="description">الوصف</label>
        <textarea id="description" placeholder="اكتب وصفاً تفصيلياً لإعلانك..." required maxlength="5000"></textarea>
      </div>
      <div class="field">
        <label for="category">الفئة</label>
        <select id="category" required><option value="">اختر الفئة</option></select>
      </div>
    </div>
    <div class="form-card">
      <h3>السعر والتفاصيل</h3>
      <div class="row3">
        <div class="field">
          <label for="price">السعر</label>
          <input type="number" id="price" placeholder="0" min="0" step="0.01"/>
        </div>
        <div class="field">
          <label for="priceType">نوع السعر</label>
          <select id="priceType">
            <option value="fixed">ثابت</option>
            <option value="negotiable">قابل للتفاوض</option>
            <option value="hourly">بالساعة</option>
            <option value="free">مجاني</option>
          </select>
        </div>
        <div class="field">
          <label for="condition">الحالة</label>
          <select id="condition">
            <option value="not-applicable">غير محدد</option>
            <option value="new">جديد</option>
            <option value="like-new">شبه جديد</option>
            <option value="used">مستعمل</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="location">الموقع</label>
        <input type="text" id="location" placeholder="المدينة، البلد"/>
      </div>
      <div class="field">
        <label>الوسوم</label>
        <div class="tags-input" onclick="this.querySelector('input').focus()">
          <input type="text" placeholder="اكتب واضغط Enter..." onkeydown="handleTag(event)"/>
        </div>
      </div>
    </div>
    <div class="form-card">
      <h3>الصور</h3>
      <div class="upload-area">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>اضغط أو اسحب الصور هنا</p>
        <span>حتى 5 صور، بحد أقصى 5 ميجا (JPG, PNG, WebP)</span>
        <input type="file" id="images" accept="image/jpeg,image/png,image/webp,image/gif" multiple onchange="handleFiles(this.files)"/>
      </div>
      <div class="preview-grid" id="preview-grid"></div>
    </div>
    <div class="error-msg" id="form-error"></div>
    <div class="actions">
      <button type="submit" class="btn btn-primary" id="submit-btn">نشر الإعلان</button>
      <a href="/" class="btn btn-outline">إلغاء</a>
    </div>
  </form>
</div>
<script src="/public/js/api.js"></script>
<script src="/public/js/app.js"></script>
<script>
if (!api.isLoggedIn()) window.location.href = '/signin.html';
const catSelect = document.getElementById('category');
CATEGORIES.forEach(c => catSelect.innerHTML += `<option value="${c.id}">${c.label}</option>`);
let selectedFiles = [], tags = [];
function handleFiles(files) { selectedFiles.push(...Array.from(files).slice(0, 5 - selectedFiles.length)); renderPreviews(); }
function renderPreviews() {
  const grid = document.getElementById('preview-grid'); grid.innerHTML = '';
  selectedFiles.forEach((f, i) => { const r = new FileReader(); r.onload = e => { grid.innerHTML += `<div class="preview-item"><img src="${e.target.result}"/><button type="button" class="preview-remove" onclick="removeFile(${i})">&times;</button></div>`; }; r.readAsDataURL(f); });
}
function removeFile(i) { selectedFiles.splice(i, 1); renderPreviews(); }
function handleTag(e) {
  if (e.key === 'Enter') { e.preventDefault(); const v = e.target.value.trim();
    if (v && !tags.includes(v) && tags.length < 10) { tags.push(v); const t = document.createElement('span'); t.className = 'tag'; t.innerHTML = `${v}<button type="button" onclick="removeTag('${v}',this)">&times;</button>`; e.target.parentElement.insertBefore(t, e.target); e.target.value = ''; }
  }
}
function removeTag(v, b) { tags = tags.filter(t => t !== v); b.parentElement.remove(); }
async function handleSubmit(e) {
  e.preventDefault(); const btn = document.getElementById('submit-btn'); const err = document.getElementById('form-error');
  btn.disabled = true; btn.textContent = 'جاري النشر...'; err.style.display = 'none';
  const fd = new FormData();
  fd.append('title', document.getElementById('title').value);
  fd.append('description', document.getElementById('description').value);
  fd.append('category', document.getElementById('category').value);
  fd.append('price', document.getElementById('price').value || 0);
  fd.append('priceType', document.getElementById('priceType').value);
  fd.append('condition', document.getElementById('condition').value);
  fd.append('location', document.getElementById('location').value);
  fd.append('tags', JSON.stringify(tags));
  selectedFiles.forEach(f => fd.append('images', f));
  try { const l = await api.createListing(fd); showToast('تم نشر الإعلان بنجاح!'); setTimeout(() => window.location.href = `/listing.html?id=${l._id}`, 600);
  } catch (error) { err.textContent = error.error || 'فشل إنشاء الإعلان'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'نشر الإعلان'; }
}
</script>
</body>
</html>
