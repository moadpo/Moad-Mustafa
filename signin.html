<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تسجيل الدخول — ماركت هب</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2D6A4F;--primary-d:#1B4332;--primary-m:#52B788;--primary-l:#D1FAE5;--accent:#D97706;--bg:#F3F4F6;--surface:#fff;--bark:#111827;--bark-m:#374151;--border:#E5E7EB;--gray:#9CA3AF;--radius:14px;}
body{font-family:'Noto Kufi Arabic','Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--primary);text-decoration:none;}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:40px 36px;width:100%;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
.tab{flex:1;text-align:center;padding:12px;font-size:15px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2.5px solid transparent;transition:.15s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
h2{font-size:22px;font-weight:800;color:var(--bark);margin-bottom:6px;}
.subtitle{font-size:13px;color:var(--gray);margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--bark-m);margin-bottom:6px;}
.field input,.field select{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Noto Kufi Arabic','Inter',sans-serif;color:var(--bark);background:#fff;outline:none;transition:.15s;
}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:var(--primary);color:#fff;font-size:15px;font-weight:700;
  font-family:'Noto Kufi Arabic',sans-serif;cursor:pointer;transition:.15s;margin-top:8px;
}
.btn:hover{background:var(--primary-d);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.error-msg{color:#EF4444;font-size:13px;margin-top:8px;display:none;}
.footer-text{text-align:center;font-size:13px;color:var(--gray);margin-top:20px;}
.footer-text a{color:var(--primary);font-weight:600;text-decoration:none;}
@media(max-width:480px){.card{padding:28px 20px;} .row2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    ماركت هب
  </a>
</nav>

<div class="page">
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="login" onclick="switchTab('login')">تسجيل الدخول</div>
      <div class="tab" data-tab="register" onclick="switchTab('register')">إنشاء حساب</div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <h2>أهلاً بعودتك</h2>
      <p class="subtitle">سجّل الدخول إلى حسابك في ماركت هب</p>
      <div class="field">
        <label for="login-email">البريد الإلكتروني</label>
        <input type="email" id="login-email" placeholder="example@email.com" required/>
      </div>
      <div class="field">
        <label for="login-password">كلمة المرور</label>
        <input type="password" id="login-password" placeholder="كلمة المرور" required minlength="6"/>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn" id="login-btn">تسجيل الدخول</button>
      <p class="footer-text">ليس لديك حساب؟ <a href="#" onclick="switchTab('register')">أنشئ واحداً</a></p>
    </form>

    <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
      <h2>أنشئ حسابك</h2>
      <p class="subtitle">انضم إلى ماركت هب وابدأ البيع أو الشراء</p>
      <div class="field">
        <label for="reg-name">الاسم الكامل</label>
        <input type="text" id="reg-name" placeholder="اسمك الكامل" required/>
      </div>
      <div class="field">
        <label for="reg-email">البريد الإلكتروني</label>
        <input type="email" id="reg-email" placeholder="example@email.com" required/>
      </div>
      <div class="row2">
        <div class="field">
          <label for="reg-password">كلمة المرور</label>
          <input type="password" id="reg-password" placeholder="٦ أحرف على الأقل" required minlength="6"/>
        </div>
        <div class="field">
          <label for="reg-location">الموقع</label>
          <input type="text" id="reg-location" placeholder="المدينة، البلد"/>
        </div>
      </div>
      <div class="error-msg" id="register-error"></div>
      <button type="submit" class="btn" id="register-btn">إنشاء الحساب</button>
      <p class="footer-text">لديك حساب بالفعل؟ <a href="#" onclick="switchTab('login')">سجّل الدخول</a></p>
    </form>
  </div>
</div>

<script src="/public/js/api.js"></script>
<script src="/public/js/app.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}
if (location.hash === '#register') switchTab('register');

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  btn.disabled = true; btn.textContent = 'جاري تسجيل الدخول...'; err.style.display = 'none';
  try {
    const data = await api.login({
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value,
    });
    api.setToken(data.token);
    api.setUser(data.user);
    showToast('أهلاً بعودتك، ' + data.user.name + '!');
    setTimeout(() => window.location.href = '/', 500);
  } catch (error) {
    err.textContent = error.error || 'فشل تسجيل الدخول';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'تسجيل الدخول';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const err = document.getElementById('register-error');
  btn.disabled = true; btn.textContent = 'جاري إنشاء الحساب...'; err.style.display = 'none';
  try {
    const data = await api.register({
      name: document.getElementById('reg-name').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
      location: document.getElementById('reg-location').value,
    });
    api.setToken(data.token);
    api.setUser(data.user);
    showToast('تم إنشاء الحساب! مرحباً بك في ماركت هب!');
    setTimeout(() => window.location.href = '/', 500);
  } catch (error) {
    err.textContent = error.error || error.errors?.[0]?.msg || 'فشل إنشاء الحساب';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'إنشاء الحساب';
  }
}
</script>
</body>
</html>
