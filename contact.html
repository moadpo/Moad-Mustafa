<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>تواصل معنا — ماركت هب</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2D6A4F;--primary-d:#1B4332;--primary-m:#52B788;--primary-l:#D1FAE5;--bg:#F3F4F6;--surface:#fff;--bark:#111827;--bark-m:#374151;--border:#E5E7EB;--gray:#9CA3AF;--radius:12px;}
body{font-family:'Noto Kufi Arabic','Inter',sans-serif;background:var(--bg);color:var(--bark);min-height:100vh;display:flex;flex-direction:column;}
nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--primary);text-decoration:none;}
.nav-links{display:flex;gap:2px;margin-right:32px;}
.nav-link{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;color:var(--bark-m);text-decoration:none;transition:.15s;}
.nav-link:hover,.nav-link.active{background:var(--primary-l);color:var(--primary);}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 16px;}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;max-width:900px;width:100%;}
.contact-info h1{font-size:30px;font-weight:800;margin-bottom:12px;}
.contact-info p{font-size:15px;color:var(--bark-m);line-height:1.8;margin-bottom:32px;}
.info-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:24px;}
.info-icon{width:44px;height:44px;border-radius:10px;background:var(--primary-l);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.info-label{font-size:12px;font-weight:700;color:var(--gray);}
.info-value{font-size:15px;font-weight:500;margin-top:2px;}
.contact-form{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:32px;}
.contact-form h2{font-size:20px;font-weight:700;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--bark-m);margin-bottom:6px;}
.field input,.field textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Noto Kufi Arabic','Inter',sans-serif;color:var(--bark);outline:none;transition:.15s;
}
.field input:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}
.field textarea{resize:vertical;min-height:120px;}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:15px;font-weight:700;font-family:'Noto Kufi Arabic',sans-serif;cursor:pointer;transition:.15s;margin-top:8px;}
.btn:hover{background:var(--primary-d);}
@media(max-width:768px){.contact-grid{grid-template-columns:1fr;} .nav-links{display:none;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    ماركت هب
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">الرئيسية</a>
    <a href="dashboard.html" class="nav-link">لوحة التحكم</a>
    <a href="contact.html" class="nav-link active">تواصل معنا</a>
  </div>
</nav>
<div class="page">
  <div class="contact-grid">
    <div class="contact-info">
      <h1>تواصل معنا</h1>
      <p>هل لديك سؤال أو اقتراح أو تحتاج مساعدة؟ نحب أن نسمع منك. تواصل معنا وسنرد عليك في أقرب وقت.</p>
      <div class="info-item">
        <div class="info-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
        <div><div class="info-label">البريد الإلكتروني</div><div class="info-value">support@markethub.com</div></div>
      </div>
      <div class="info-item">
        <div class="info-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div><div class="info-label">الموقع</div><div class="info-value">عالمي — عبر الإنترنت بالكامل</div></div>
      </div>
      <div class="info-item">
        <div class="info-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div><div class="info-label">وقت الرد</div><div class="info-value">خلال 24 ساعة</div></div>
      </div>
    </div>
    <div class="contact-form">
      <h2>أرسل رسالة</h2>
      <form onsubmit="handleContact(event)">
        <div class="field"><label for="c-name">اسمك</label><input type="text" id="c-name" placeholder="الاسم الكامل" required/></div>
        <div class="field"><label for="c-email">البريد الإلكتروني</label><input type="email" id="c-email" placeholder="example@email.com" required/></div>
        <div class="field"><label for="c-subject">الموضوع</label><input type="text" id="c-subject" placeholder="ما الموضوع؟" required/></div>
        <div class="field"><label for="c-message">الرسالة</label><textarea id="c-message" placeholder="أخبرنا بالمزيد..." required></textarea></div>
        <button type="submit" class="btn">إرسال الرسالة</button>
      </form>
    </div>
  </div>
</div>
<script src="public/js/api.js"></script>
<script src="public/js/app.js"></script>
<script>
function handleContact(e) { e.preventDefault(); showToast('تم إرسال الرسالة! سنرد عليك قريباً.'); e.target.reset(); }
</script>
</body>
</html>
