<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>إعلان — ماركت هب</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2D6A4F;--primary-d:#1B4332;--primary-m:#52B788;--primary-l:#D1FAE5;--accent:#D97706;--bg:#F3F4F6;--surface:#fff;--bark:#111827;--bark-m:#374151;--border:#E5E7EB;--gray:#9CA3AF;--radius:12px;}
body{font-family:'Noto Kufi Arabic','Inter',sans-serif;background:var(--bg);color:var(--bark);}
nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:16px;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--primary);text-decoration:none;}
.nav-back{font-size:14px;font-weight:600;color:var(--primary);text-decoration:none;margin-right:auto;display:flex;align-items:center;gap:6px;}
.container{max-width:1100px;margin:32px auto;padding:0 16px 60px;display:grid;grid-template-columns:1fr 380px;gap:32px;}
.gallery{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.gallery-main{width:100%;aspect-ratio:4/3;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.gallery-main img{width:100%;height:100%;object-fit:cover;}
.gallery-main svg{width:64px;height:64px;color:var(--gray);}
.gallery-thumbs{display:flex;gap:8px;padding:12px;}
.gallery-thumbs img{width:72px;height:72px;object-fit:cover;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:.15s;}
.gallery-thumbs img:hover,.gallery-thumbs img.active{border-color:var(--primary);}
.info{display:flex;flex-direction:column;gap:20px;}
.info-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--primary-l);color:var(--primary);}
.info-card h1{font-size:22px;font-weight:800;margin:12px 0 8px;}
.price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;}
.price{font-size:28px;font-weight:800;color:var(--primary);}
.price-type{font-size:13px;color:var(--gray);font-weight:500;}
.meta-row{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--bark-m);padding:16px 0;border-top:1px solid var(--border);}
.meta-item{display:flex;align-items:center;gap:6px;}
.meta-item svg{width:16px;height:16px;color:var(--gray);}
.desc{white-space:pre-wrap;font-size:14px;line-height:1.8;color:var(--bark-m);}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.tags span{background:var(--bg);padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--bark-m);}
.seller-card{display:flex;align-items:center;gap:14px;}
.seller-avatar{width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;}
.seller-info h4{font-size:15px;font-weight:700;}
.seller-info p{font-size:12px;color:var(--gray);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;font-family:'Noto Kufi Arabic',sans-serif;cursor:pointer;border:none;transition:.15s;width:100%;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-d);}
.btn-outline{background:transparent;color:var(--bark-m);border:1.5px solid var(--border);}
.btn-outline:hover{background:var(--bg);}
.btn-group{display:flex;flex-direction:column;gap:10px;}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--radius);padding:28px;width:100%;max-width:480px;box-shadow:0 20px 40px rgba(0,0,0,.15);}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal textarea{width:100%;min-height:100px;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Noto Kufi Arabic','Inter',sans-serif;resize:vertical;outline:none;}
.modal textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);}
.modal-actions{display:flex;gap:10px;justify-content:flex-start;margin-top:16px;}
.modal-actions .btn{width:auto;}
@media(max-width:768px){.container{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    ماركت هب
  </a>
  <a href="/" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    تصفح
  </a>
</nav>
<div class="container" id="content">
  <div style="text-align:center;padding:60px;grid-column:1/-1;"><div class="spinner"></div></div>
</div>
<div class="modal-overlay" id="msg-modal">
  <div class="modal">
    <h3>أرسل رسالة</h3>
    <textarea id="msg-text" placeholder="مرحباً، أنا مهتم بهذا الإعلان..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="sendMessage()">إرسال</button>
      <button class="btn btn-outline" onclick="document.getElementById('msg-modal').classList.remove('open')">إلغاء</button>
    </div>
  </div>
</div>
<script src="/public/js/api.js"></script>
<script src="/public/js/app.js"></script>
<script>
const listingId = new URLSearchParams(location.search).get('id');
let listing = null;
async function load() {
  if (!listingId) { document.getElementById('content').innerHTML = '<p style="text-align:center;padding:60px;grid-column:1/-1;">الإعلان غير موجود.</p>'; return; }
  try { listing = await api.getListing(listingId); document.title = listing.title + ' — ماركت هب'; render();
  } catch (e) { document.getElementById('content').innerHTML = '<p style="text-align:center;padding:60px;grid-column:1/-1;color:var(--gray);">الإعلان غير موجود أو حدث خطأ.</p>'; }
}
function render() {
  const l = listing;
  const priceText = l.priceType === 'free' ? 'مجاني' : `${l.price?.toLocaleString() || 0} د.إ`;
  const priceLabel = { fixed: '', negotiable: 'قابل للتفاوض', hourly: '/ ساعة', free: '' }[l.priceType] || '';
  const condLabel = { 'new': 'جديد', 'like-new': 'شبه جديد', 'used': 'مستعمل', 'not-applicable': '' }[l.condition] || '';
  const seller = l.seller || {};
  const isMine = api.getUser()?._id === seller._id;
  const mainImg = l.images?.[0] || '';
  document.getElementById('content').innerHTML = `
    <div>
      <div class="gallery">
        <div class="gallery-main" id="main-img">
          ${mainImg ? `<img src="${mainImg}" alt="${l.title}"/>` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`}
        </div>
        ${l.images?.length > 1 ? `<div class="gallery-thumbs">${l.images.map((img, i) => `<img src="${img}" alt="" class="${i === 0 ? 'active' : ''}" onclick="switchImg('${img}',this)"/>`).join('')}</div>` : ''}
      </div>
      <div class="info-card" style="margin-top:20px;">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:12px;">الوصف</h3>
        <div class="desc">${l.description}</div>
        ${l.tags?.length ? `<div class="tags">${l.tags.map(t => `<span>${t}</span>`).join('')}</div>` : ''}
      </div>
    </div>
    <div class="info">
      <div class="info-card">
        <span class="badge">${getCategoryLabel(l.category)}</span>
        <h1>${l.title}</h1>
        <div class="price-row"><span class="price">${priceText}</span><span class="price-type">${priceLabel}</span></div>
        <div class="meta-row">
          ${l.location ? `<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${l.location}</span>` : ''}
          ${condLabel ? `<span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>${condLabel}</span>` : ''}
          <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${l.views} مشاهدة</span>
          <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${timeAgo(l.createdAt)}</span>
        </div>
      </div>
      <div class="info-card">
        <div class="seller-card">
          <div class="seller-avatar">${seller.name ? seller.name.charAt(0).toUpperCase() : '?'}</div>
          <div class="seller-info"><h4>${seller.name || 'غير معروف'}</h4><p>${seller.location || 'الموقع غير محدد'}</p></div>
        </div>
      </div>
      <div class="btn-group">
        ${isMine ? `<a href="/create-listing.html?edit=${l._id}" class="btn btn-primary">تعديل الإعلان</a><button class="btn btn-outline" onclick="deleteListing()">حذف الإعلان</button>`
        : `<button class="btn btn-primary" onclick="openMessage()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>تواصل مع البائع</button>
           <button class="btn btn-outline" onclick="toggleSave()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>حفظ الإعلان</button>`}
      </div>
    </div>`;
}
function switchImg(src, el) { document.querySelector('.gallery-main img').src = src; document.querySelectorAll('.gallery-thumbs img').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
function openMessage() { if (!api.isLoggedIn()) { window.location.href = '/signin.html'; return; } document.getElementById('msg-modal').classList.add('open'); }
async function sendMessage() {
  const text = document.getElementById('msg-text').value.trim(); if (!text) return;
  try { await api.sendMessage({ receiver: listing.seller._id, listing: listing._id, text }); document.getElementById('msg-modal').classList.remove('open'); showToast('تم إرسال الرسالة!');
  } catch (e) { showToast(e.error || 'فشل إرسال الرسالة', 'error'); }
}
async function toggleSave() {
  if (!api.isLoggedIn()) { window.location.href = '/signin.html'; return; }
  try { const res = await api.saveListing(listingId); showToast(res.saved ? 'تم حفظ الإعلان!' : 'تم إلغاء الحفظ');
  } catch (e) { showToast('فشل الحفظ', 'error'); }
}
async function deleteListing() {
  if (!confirm('هل أنت متأكد من حذف هذا الإعلان؟')) return;
  try { await api.deleteListing(listingId); showToast('تم حذف الإعلان'); setTimeout(() => window.location.href = '/dashboard.html', 500);
  } catch (e) { showToast('فشل الحذف', 'error'); }
}
load();
</script>
</body>
</html>
